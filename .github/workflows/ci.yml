name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: make install
      - run: make test
      - run: make lint


  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: correlis_test
          POSTGRES_USER: correlis
          POSTGRES_PASSWORD: correlis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U correlis -d correlis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CORRELIS_TEST_DATABASE_URL: postgresql+psycopg://correlis:correlis@localhost:5432/correlis_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: make install
      - run: make test-postgres
      - run: make lint
