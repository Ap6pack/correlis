name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: make install
      - name: Run unit tests
        shell: bash
        run: |
          if ! make test > /tmp/correlis-test.log 2>&1; then
            tail -n 120 /tmp/correlis-test.log
            exit 1
          fi
          tail -n 20 /tmp/correlis-test.log
      - name: Upload failed unit-test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-${{ matrix.python-version }}
          path: /tmp/correlis-test.log
          if-no-files-found: error
          retention-days: 7
      - run: make lint


  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: correlis_test
          POSTGRES_USER: correlis
          POSTGRES_PASSWORD: correlis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U correlis -d correlis_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CORRELIS_TEST_DATABASE_URL: postgresql+psycopg://correlis:correlis@localhost:5432/correlis_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: make install
      - name: Run PostgreSQL integration tests
        shell: bash
        run: |
          if ! make test-postgres > /tmp/correlis-postgres-test.log 2>&1; then
            tail -n 160 /tmp/correlis-postgres-test.log
            exit 1
          fi
          tail -n 20 /tmp/correlis-postgres-test.log
      - name: Upload failed PostgreSQL test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: postgres-test-3.13
          path: /tmp/correlis-postgres-test.log
          if-no-files-found: error
          retention-days: 7
      - run: make lint
