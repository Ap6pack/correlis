services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: correlis
      POSTGRES_USER: correlis
      POSTGRES_PASSWORD: correlis
    ports:
      - "5432:5432"
    volumes:
      - correlis-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U correlis -d correlis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  correlis-postgres-data:
