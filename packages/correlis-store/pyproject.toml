[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "correlis-store"
version = "0.1.0"
description = "Durable observation and evidence persistence for Correlis"
requires-python = ">=3.11"
dependencies = [
  "correlis-schema>=0.1.0",
  "SQLAlchemy>=2.0,<3",
  "psycopg[binary]>=3,<4",
  "alembic>=1.13,<2",
]

[tool.setuptools.packages.find]
where = ["src"]
