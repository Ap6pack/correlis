[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "correlis-ontology"
version = "0.1.0"
description = "Versioned object, relationship, and action semantics for Correlis"
requires-python = ">=3.11"
dependencies = [
  "correlis-schema>=0.1.0",
  "pydantic>=2.12,<3",
]

[tool.setuptools.packages.find]
where = ["src"]
